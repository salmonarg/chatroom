<!DOCTYPE html>
<html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>external link - coffeeroom</title>
    <meta name="theme-color" content="#c7d6e5" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#191d22" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <style>
        @font-face {
            font-family: unifont;
            src: url(../fonts/unifont.otf);
        }
        @font-face {
            font-family: sentient;
            font-weight: bold;
            src: url(../fonts/Sentient-Bold.otf);
        }

        :root {
            --bg-color: #d8e3ed;
            --chat-bg-color: #e9eff5;
            --popup-bg-color: rgba(255, 255, 255, 0.5);
            --border-color: #a2adb9;
            --comment-color: #808ea1;
            --note-color: #69727d;
            --text-color: #444f5d;
            --highlight-color: #b7c2d0;
            --pre-code-color: #ced9e3;
            --button-color: #f4f7f9;
            --button-hover-color: #ecf1f4;
            --button-active-color: #dee4e8;
            --msg-bg-color: #dbe4ed;
            --auth-bg-color: #c7d6e5;
        }
        [data-theme="dark"] {
            --bg-color: #242931;
            --chat-bg-color: #2e3640;
            --popup-bg-color: rgba(46, 54, 64, 0.5);
            --border-color: #555c68;
            --comment-color: #555c68;
            --note-color: #888e9d;
            --text-color: #e9f0f5;
            --highlight-color: #444f5d;
            --pre-code-color: #2e3640;
            --button-color: #2e3640;
            --button-hover-color: #444f5d;
            --button-active-color: #39424e;
            --msg-bg-color: #444f5d;
            --auth-bg-color: #191d22;
        }
        [data-theme="mono"] {
            --bg-color: #ffffff;
            --chat-bg-color: #ffffff;
            --popup-bg-color: #ffffff;
            --border-color: #777777;
            --comment-color: #777777;
            --note-color: #777777;
            --text-color: #000000;
            --highlight-color: #cccccc;
            --pre-code-color: #dddddd;
            --button-color: #ffffff;
            --button-hover-color: #ffffff;
            --button-active-color: #eeeeee;
            --msg-bg-color: #ffffff;
            --auth-bg-color: #ffffff;
        }

        body {
            background-color: var(--auth-bg-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        html {
            background-color: var(--auth-bg-color);
        }

        @media (max-width: 600px) {
            body {
                padding: 0 15px 0 15px;
                margin: 0;
            }
        }

        a {
            color: var(--text-color);
            cursor: pointer;
            font-family: 'unifont', sans-serif;
        }

        a:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        ::selection {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
        
        .url-text {
            color: var(--text-color);
            word-break: break-all;
            display: block;
            margin-top: 10px;
            margin-bottom: 20px;
            padding: 10px;
            background: var(--chat-bg-color);
            border-radius: 3px;
            border: 1px solid var(--border-color);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            font-family: 'unifont', sans-serif;
            font-size: 14px;
            color: var(--text-color);
            background-color: var(--button-color);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            padding: 3px 10px;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            height: 23px;
            flex-shrink: 0;
            box-sizing: border-box;
            line-height: 1;
            vertical-align: middle;
        }

        .btn:hover {
            background-color: var(--button-hover-color);
            color: var(--text-color);
        }

        .btn:active {
            background-color: var(--button-active-color);
        }

    </style>
    <script>
        (function() {
            const savedMode = localStorage.getItem('theme-mode') || 'auto';
            let isDark = false;
            let isMono = false;
            if (savedMode === 'auto') {
                isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            } else if (savedMode === 'mono') {
                isMono = true;
            } else {
                isDark = (savedMode === 'dark');
            }
            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else if (isMono) {
                document.documentElement.setAttribute('data-theme', 'mono');
            }
        })();
    </script>
    </head>
    <body>
        <div style="height: 100vh; width: 100%; max-width: 500px; margin: 0 auto; display: flex; align-items: center; justify-content: center; box-sizing: border-box;">
            <div style="border: 1px solid var(--border-color); background-color: var(--bg-color); border-radius: 5px; padding: 20px; width: 100%; box-sizing: border-box; text-align: center;">
                <div style="font-size: 16px; margin-bottom: 10px; font-family: 'unifont', sans-serif; font-weight: bold;">External Link Warning</div>
                <div style="font-size: 14px; margin-bottom: 10px; font-family: 'unifont', sans-serif;">You are about to visit an external website. Please be careful.</div>
                
                <div class="url-text" id="target-url" style="font-family: 'unifont', sans-serif; font-size: 14px;">Loading...</div>
                
                <div class="btn-group">
                    <button class="btn" onclick="window.close()">Cancel</button>
                    <a href="#" class="btn" id="continue-btn" target="_self">Continue</a>
                </div>
            </div>
        </div>
    <script src="/scripts/theme.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const url = params.get('url');
        if (url) {
            document.getElementById('target-url').textContent = url;
            const continueBtn = document.getElementById('continue-btn');
            continueBtn.href = url;
            continueBtn.rel = "noopener noreferrer";
        } else {
            document.getElementById('target-url').textContent = 'invalid url';
            document.getElementById('continue-btn').style.display = 'none';
        }
    </script>
    <script defer src="/scripts/favicon.js"></script>
    </body>
</html>
