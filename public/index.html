<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coffeeroom</title>
    <meta name="theme-color" content="#d8e3ed" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#242931" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/style.css">
    <script>
      (function() {
          const savedMode = localStorage.getItem('theme-mode') || 'auto';
          let isDark = false;
          let isMono = false;
          if (savedMode === 'auto') {
              isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          } else if (savedMode === 'mono') {
              isMono = true;
          } else {
              isDark = (savedMode === 'dark');
          }
          if (isDark) {
              document.documentElement.setAttribute('data-theme', 'dark');
          } else if (isMono) {
              document.documentElement.setAttribute('data-theme', 'mono');
          }
      })();
    </script>
	  <script defer src="https://cloud.umami.is/script.js" data-website-id="cf3f6b51-a212-4d89-bad2-8d83e259075d"></script>
  </head>
  <body>
    <div class="box">
        <div class="content">
          <div class="header">
            <span class="title">coffeeroom</span>
            <span class="themebtn">
              <span id="user-display">loading...</span>
              theme: <a href="#" id="darkModeButton">auto</a>
            </span>
          </div>
          <div class="menu-row">
            <div class="mainMenu channel-menu">
              <div class="menu-wrapper">
                <div id="channel-menu-btn" class="menu-item"><span style="color: var(--border-color);">*</span></div>
              </div>
            </div>
            <div class="mainMenu status-menu">
              <span id="status" class="connection-status">connecting...</span><div class="menu-item" id="retryButton">retry</div><div class="menu-item" id="reloadButton">reload</div>
              <div class="right-menu">
                <div class="menu-wrapper">
                  <div id="online-users" class="menu-item"><span style="color: var(--border-color);">*</span></div>
                  <div id="online-users-popup" class="user-list-popup"></div>
                </div>
              </div>
            </div>
          </div>
          <div style="display: flex; gap: 3px;">
            <div id="room-list">
            </div>
            <div style="display: flex; flex-direction: column; width: 100%; min-width: 0;">
              <div id="chat-window">
              </div>
              <form id="chat-form">
              <input type="text" id="message-input" placeholder="input..." autocomplete="off" />
              <button type="submit">send</button>
              </form>
            </div>
          </div>
          <br>
          <br>
        </div>
        <br>
        <footer>
          <span class="copyright">Copyright (c) 2025-2026 <a href="https://caffeine.ink" target="_blank" rel="noopener noreferrer">Caffeine Ink</a>. Licensed under <a href="https://caffeine.ink/pages/agpl-3.0-standalone.html" target="_blank" rel="noopener noreferrer">AGPLv3</a>.</span>
          <span class="version"><span class="app-ver"></span> (<a href="https://github.com/salmonarg/chatroom" target="_blank" rel="noopener noreferrer">source code</a>)</span>
        </footer>
    </div>
    <script src="/scripts/client/globals.js"></script>
    <script src="/scripts/client/ui.js"></script>
    <script src="/scripts/client/api.js"></script>
    <script src="/scripts/client/room.js"></script>
    <script src="/scripts/client/commands.js"></script>
    <script src="/scripts/client/main.js"></script>
    <script src="/scripts/theme.js"></script>
    <script defer src="/scripts/favicon.js"></script>
    <script src="/scripts/version.js"></script>
  </body>
</html>
